name: OpenLoop Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Railway
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: cd app && npm ci
      
      # PHASE 1: VALIDATE BUILD
      - name: TypeScript check
        run: cd app && npx tsc --noEmit
      
      - name: Next.js build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: cd app && npm run build
      
      - name: Lint
        run: cd app && npm run lint --if-present
      
      # PHASE 2: SECURITY
      - name: Dependency audit
        run: cd app && npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: SAST scan
        run: |
          cd app
          echo "Running security scans..."
          # Check for common vulnerabilities
          grep -r "eval\|exec\|innerHTML" src/ || echo "No dangerous patterns found"
        continue-on-error: true
      
      # PHASE 3: DEPLOY
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          TELEGRAM_BOT_SECRET_TOKEN: ${{ secrets.TELEGRAM_BOT_SECRET_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          npm install -g railway
          cd /home/runner/work/OpenLoop/OpenLoop
          railway login --token $RAILWAY_TOKEN
          railway up
        continue-on-error: true
      
      # PHASE 4: POST-DEPLOYMENT
      - name: Wait for deployment
        run: sleep 30
      
      - name: Health check
        run: |
          # Check if the app is responding
          max_attempts=5
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -f "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/health" 2>/dev/null || true; then
              echo "✓ Application is responding"
              exit 0
            fi
            echo "Attempt $((attempt+1))/$max_attempts - waiting for app..."
            sleep 10
            ((attempt++))
          done
          echo "⚠ Health check inconclusive (app may still be starting)"
          exit 0
        continue-on-error: true
      
      # PHASE 5: NOTIFY
      - name: Deployment status
        if: always()
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "DEPLOYMENT STATUS"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          echo "Commit:     ${{ github.sha }}"
          echo "Ref:        ${{ github.ref }}"
          echo "Status:     ${{ job.status }}"
          echo ""
          echo "Dashboard:  https://railway.app"
          echo "Logs:       See Railway dashboard"
          echo ""
          echo "═══════════════════════════════════════════════════════════"
      
      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "OpenLoop Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*OpenLoop Deployment*\nStatus: `${{ job.status }}`\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "Railway Dashboard"
                      },
                      "url": "https://railway.app"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true
